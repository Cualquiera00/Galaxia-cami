<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Universo de Cami</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #040209; font-family: 'Montserrat', sans-serif; color: #ffffff; }
        #galaxy-container { position: relative; width: 100%; height: 100%; background: radial-gradient(circle at center, #120924 0%, #040209 70%); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        #galaxy-core {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px;
            background: radial-gradient(circle, #ffffff 0%, #ff4d6d 40%, #ff758f 70%, transparent 100%);
            border-radius: 50%; box-shadow: 0 0 40px #ff4d6d, 0 0 80px #ff758f, 0 0 120px #9d4edd;
            z-index: 5; animation: pulse 4s infinite ease-in-out; pointer-events: none;
        }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; box-shadow: 0 0 40px #ff4d6d, 0 0 80px #ff758f, 0 0 120px #9d4edd; } 50% { transform: translate(-50%, -50%) scale(1.25); opacity: 1; box-shadow: 0 0 60px #ff4d6d, 0 0 110px #ff758f, 0 0 160px #c77dff; } }
        .phrase-star {
            position: absolute; left: 0; top: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10; user-select: none; white-space: nowrap; will-change: transform, opacity;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .star-glow-dot {
            width: 10px; height: 10px; background-color: #ffffff; border-radius: 50%;
            box-shadow: 0 0 12px #fff, 0 0 25px var(--accent-color); margin-bottom: 8px; transition: transform 0.3s, box-shadow 0.3s; position: absolute; z-index: -1; 
        }
        .star-text {
            font-family: 'Dancing Script', cursive; font-size: 18pt; font-weight: 700; color: #ffffff;
            text-shadow: 0 0 8px var(--accent-color), 0 0 20px rgba(255,255,255,0.4); transition: font-size 0.3s, text-shadow 0.3s, color 0.3s; text-align: center; margin-top: 15px;
        }
        .star-image {
            max-width: 60px; max-height: 60px; object-fit: cover; border-radius: 50%; border: 2px solid var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color); transition: max-width 0.3s, max-height 0.3s, box-shadow 0.3s, border-radius 0.3s; margin-top: 15px;
        }
        .phrase-star:hover { transform: translate(-50%, -50%) scale(1.6); z-index: 1001 !important; }
        .phrase-star:hover .star-glow-dot { box-shadow: 0 0 20px #fff, 0 0 40px var(--accent-color); }
        .phrase-star:hover .star-text { color: #fff; font-size: 22pt; text-shadow: 0 0 15px var(--accent-color), 0 0 35px #fff; }
        .phrase-star:hover .star-image { max-width: 120px; max-height: 120px; border-radius: 15px; box-shadow: 0 0 30px var(--accent-color); }
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #05030a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1); padding: 20px;
        }
        #intro-title { font-size: 34pt; font-weight: 300; letter-spacing: 6px; text-transform: uppercase; text-shadow: 0 0 20px rgba(255,255,255,0.3); margin-bottom: 15px; text-align: center; animation: fadeInDown 1.5s ease; }
        #intro-subtitle { font-family: 'Dancing Script', cursive; font-size: 24pt; color: #ff758f; margin-bottom: 45px; text-align: center; text-shadow: 0 0 10px rgba(255, 117, 143, 0.4); animation: fadeInUp 1.8s ease; }
        #start-btn {
            background: transparent; border: 2px solid rgba(255, 255, 255, 0.8); color: #ffffff; padding: 14px 45px; font-family: 'Montserrat', sans-serif;
            font-size: 11pt; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; border-radius: 40px; transition: all 0.4s ease; box-shadow: 0 0 15px rgba(255,255,255,0.05); animation: fadeIn 2.2s ease;
        }
        #start-btn:hover { background-color: #ffffff; color: #05030a; box-shadow: 0 0 35px rgba(255,255,255,0.7); transform: scale(1.06); }
        #message-card {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.85); background: rgba(14, 8, 26, 0.93); border: 1.5px solid rgba(255, 77, 109, 0.6); box-shadow: 0 0 40px rgba(255, 77, 109, 0.3), inset 0 0 20px rgba(157, 78, 221, 0.2); padding: 35px 30px; border-radius: 24px; text-align: center; max-width: 90%; width: 420px; z-index: 1000; opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        #message-card.active { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }
        #card-image-container { display: none; margin-bottom: 20px; }
        #card-image { max-width: 100%; max-height: 250px; border-radius: 12px; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        #card-text { font-family: 'Dancing Script', cursive; font-size: 28pt; color: #ffffff; margin-bottom: 18px; text-shadow: 0 0 12px var(--card-accent, #ff4d6d); line-height: 1.3; }
        #card-subtext { font-size: 10pt; color: #b3a4cb; margin-bottom: 28px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 300; }
        .close-btn {
            background: linear-gradient(45deg, #ff4d6d, #ff758f); border: none; color: white; padding: 11px 30px; border-radius: 30px; font-family: 'Montserrat', sans-serif; font-size: 9pt; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; box-shadow: 0 0 15px rgba(255,77,109,0.4); transition: transform 0.2s, box-shadow 0.2s;
        }
        .close-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(255,77,109,0.7); }
        #instructions { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); color: rgba(255, 255, 255, 0.4); font-size: 9pt; letter-spacing: 2px; text-transform: uppercase; pointer-events: none; text-align: center; z-index: 500; width: 90%; font-weight: 300; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        @media (max-width: 600px) {
            .star-text { font-size: 13pt !important; } .phrase-star:hover .star-text { font-size: 16pt !important; }
            #intro-title { font-size: 22pt; letter-spacing: 4px; } #intro-subtitle { font-size: 18pt; margin-bottom: 35px; } #start-btn { padding: 12px 35px; font-size: 10pt; }
            #card-text { font-size: 22pt !important; } .star-image { max-width: 45px; max-height: 45px; } .phrase-star:hover .star-image { max-width: 90px; max-height: 90px; }
        }
    </style>
</head>
<body>
    <div id="intro-overlay">
        <h1 id="intro-title">Mi Universo</h1>
        <p id="intro-subtitle">Para la estrella más brillante del cosmos: Mi Camila</p>
        <button id="start-btn">Descubrir Galaxia</button>
    </div>
    <div id="galaxy-container">
        <div id="galaxy-core"></div>
        <canvas id="space-canvas"></canvas>
    </div>
    <div id="message-card">
        <div id="card-image-container"><img id="card-image" src="" alt="Recuerdo"></div>
        <div id="card-text"></div>
        <div id="card-subtext">Una estrella de tu galaxia</div>
        <button class="close-btn" id="close-card-btn">Regresar al cosmos</button>
    </div>
    <div id="instructions">Pasa el cursor sobre una estrella para detener su órbita y haz clic para liberar su magia ✨</div>

    <script>
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('galaxy-container');
        const card = document.getElementById('message-card');
        const cardText = document.getElementById('card-text');
        const cardImageContainer = document.getElementById('card-image-container');
        const cardImage = document.getElementById('card-image');
        
        let centerX = window.innerWidth / 2, centerY = window.innerHeight / 2, radiusFactor = 1, isCardOpen = false;
        const colors = ["#ff4d6d", "#ff758f", "#c77dff", "#e0aaff", "#9d4edd", "#ff8fa3", "#ea698b", "#b5179e", "#72efdd", "#4cc9f0", "#4361ee"];

        // AQUÍ ESTÁN LAS FRASES Y TUS IMÁGENES INTERCALADAS
        const phrasesDataRaw = [
            { type: 'text', text: "Te amo mami" },
            { type: 'image', imageUrl: "156344.png", defaultText: "tu eres este gatito todo tierno y lindo🥺" },
            { type: 'text', text: "Eres mi pedacito de magia" },
            { type: 'image', imageUrl: "156095.jpg", defaultText: "Este es mi lugar favorito" },
            { type: 'text', text: "Te adoro mi vida" },
            { type: 'image', imageUrl: "156728.jpg", defaultText: "Con todo mi corazón, de aquí al fin del universo" },
            { type: 'text', text: "Eres perfecta para mí" },
            { type: 'image', imageUrl: "156730.jpg", defaultText: "Tú y yo" },
            { type: 'text', text: "Tu sonrisa ilumina mi universo" },
            { type: 'image', imageUrl: "156731.jpg", defaultText: "Magia" },
            { type: 'text', text: "Te elegiría mil veces dónde sea" },
            { type: 'image', imageUrl: "156732.jpg", defaultText: "I love You baby" },
            { type: 'text', text: "Eres el amor de mi vida" },
            { type: 'image', imageUrl: "156734.jpg", defaultText: "te lo digo enserio" },
            { type: 'text', text: "Cada día es mejor contigo" },
            { type: 'image', imageUrl: "156750.png", defaultText: "recuérdalo siempre mami" },
            { type: 'text', text: "Me tienes locamente enamorado" },
            { type: 'image', imageUrl: "156098.jpg", defaultText: "Mi universo" },
            { type: 'text', text: "Te quiero hasta la luna" },
            { type: 'image', imageUrl: "333333.jpg", defaultText: "Te amo" },
            { type: 'text', text: "Mi niña preciosa" },
            { type: 'image', imageUrl: "78910.jpg", defaultText: "Te adoro amada mía" },
            { type: 'text', text: "Guapaaaaa" },
            { type: 'image', imageUrl: "123456.jpg", defaultText: "Te Extraño siempre, aunque estés conmigo 🥺" },
            { type: 'text', text: "Siempre te voy a amar" },
            { type: 'image', imageUrl: "Mibebe.jpg", defaultText: "Eres la mujer con la que siempre soñé" },
            { type: 'text', text: "espero que este regalo te guste" },
            { type: 'image', imageUrl: "Mailov.jpg", defaultText: "Te amaré hasta que te aburras de miii" },
            
        ];

        let phrasesData = phrasesDataRaw.map((data, index) => {
            return { ...data, baseR: 85 + index * 25, speed: 0.007 * (1 - (index / phrasesDataRaw.length) * 0.75), color: colors[index % colors.length] };
        });

        let phrases = [], staticStars = [], orbitingStars = [], nebulas = [], hearts = [];

        function initDimensions() {
            centerX = window.innerWidth / 2; centerY = window.innerHeight / 2;
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            if (window.innerWidth < 600) { radiusFactor = window.innerWidth / 560; } 
            else if (window.innerWidth < 1000) { radiusFactor = window.innerWidth / 900; } 
            else { radiusFactor = Math.min(window.innerWidth, window.innerHeight) / 1050; }
            if (radiusFactor < 0.35) radiusFactor = 0.35;
        }

        function generateCosmos() {
            for (let i = 0; i < 150; i++) staticStars.push({ x: Math.random(), y: Math.random(), size: Math.random() * 1.5, twinkleSpeed: 0.008 + Math.random() * 0.02, phase: Math.random() * Math.PI });
            for (let i = 0; i < 350; i++) {
                const r = Math.random() * 650 + 15;
                orbitingStars.push({ r: r, angle: Math.random() * Math.PI * 2, speed: 0.001 + (0.015 / Math.sqrt(r)), size: Math.random() * 1.6, color: ['#ffffff', '#ffb3c1', '#e0aaff', '#c77dff', '#72efdd'][Math.floor(Math.random() * 5)] });
            }
            for (let i = 0; i < 6; i++) nebulas.push({ x: (Math.random() - 0.5) * 150, y: (Math.random() - 0.5) * 70, r: Math.random() * 180 + 120, color: i % 2 === 0 ? 'rgba(255, 77, 109, 0.035)' : 'rgba(157, 78, 221, 0.035)' });
        }

        function createPhraseElements() {
            phrases = phrasesData.map((data, i) => {
                const div = document.createElement('div'); div.className = 'phrase-star'; div.style.setProperty('--accent-color', data.color);
                const dot = document.createElement('div'); dot.className = 'star-glow-dot'; div.appendChild(dot);
                if (data.type === 'text') {
                    const textSpan = document.createElement('div'); textSpan.className = 'star-text'; textSpan.innerText = data.text; div.appendChild(textSpan);
                } else {
                    const img = document.createElement('img'); img.className = 'star-image'; img.src = data.imageUrl; div.appendChild(img);
                }
                container.appendChild(div);
                const phraseObj = { ...data, element: div, angle: i * (Math.PI * 2 / phrasesData.length), hovered: false };
                div.addEventListener('mouseenter', () => phraseObj.hovered = true);
                div.addEventListener('mouseleave', () => phraseObj.hovered = false);
                div.addEventListener('click', () => { explodeHearts(centerX, centerY, phraseObj.color); openCard(phraseObj, phraseObj.color); });
                return phraseObj;
            });
        }

        class HeartParticle {
            constructor(x, y, color) {
                this.x = x; this.y = y; const angle = Math.random() * Math.PI * 2; const velocity = Math.random() * 4 + 2;
                this.vx = Math.cos(angle) * velocity; this.vy = Math.sin(angle) * velocity - 1; this.size = Math.random() * 14 + 10;
                this.opacity = 1; this.color = color; this.rotation = Math.random() * Math.PI * 2; this.rotationSpeed = (Math.random() - 0.5) * 0.08;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.04; this.opacity -= 0.015; this.rotation += this.rotationSpeed; }
            draw(ctx) {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation); ctx.globalAlpha = this.opacity; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.moveTo(0, this.size * 0.3); ctx.bezierCurveTo(-this.size * 0.5, -this.size * 0.4, -this.size, -this.size * 0.05, 0, this.size);
                ctx.bezierCurveTo(this.size, -this.size * 0.05, this.size * 0.5, -this.size * 0.4, 0, this.size * 0.3); ctx.fill(); ctx.restore();
            }
        }

        function explodeHearts(x, y, color) { for (let i = 0; i < 35; i++) hearts.push(new HeartParticle(x, y, color)); }

        function openCard(starObj, color) {
            card.style.setProperty('--card-accent', color);
            if (starObj.type === 'text') { cardImageContainer.style.display = 'none'; cardText.innerText = starObj.text; cardText.style.fontSize = window.innerWidth < 600 ? '22pt' : '28pt';
            } else { cardImage.src = starObj.imageUrl; cardImageContainer.style.display = 'block'; cardText.innerText = starObj.defaultText; cardText.style.fontSize = window.innerWidth < 600 ? '18pt' : '20pt'; }
            card.classList.add('active'); isCardOpen = true;
        }

        document.getElementById('close-card-btn').addEventListener('click', () => { card.classList.remove('active'); setTimeout(() => { cardImageContainer.style.display = 'none'; }, 400); isCardOpen = false; });

        function animate() {
            requestAnimationFrame(animate); ctx.fillStyle = '#040209'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            nebulas.forEach(n => { const grad = ctx.createRadialGradient(centerX + n.x, centerY + n.y, 0, centerX + n.x, centerY + n.y, n.r); grad.addColorStop(0, n.color); grad.addColorStop(1, 'transparent'); ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(centerX + n.x, centerY + n.y, n.r, 0, Math.PI * 2); ctx.fill(); });
            staticStars.forEach(s => { s.phase += s.twinkleSpeed; ctx.fillStyle = `rgba(255, 255, 255, ${0.2 + 0.8 * Math.abs(Math.sin(s.phase))})`; ctx.beginPath(); ctx.arc(s.x * canvas.width, s.y * canvas.height, s.size, 0, Math.PI * 2); ctx.fill(); });
            orbitingStars.forEach(s => { if (!isCardOpen) s.angle += s.speed; const x = centerX + s.r * radiusFactor * Math.cos(s.angle), y = centerY + s.r * radiusFactor * Math.sin(s.angle) * 0.35, sinA = Math.sin(s.angle); ctx.fillStyle = s.color; ctx.globalAlpha = 0.15 + 0.75 * ((sinA + 1) / 2); ctx.beginPath(); ctx.arc(x, y, s.size, 0, Math.PI * 2); ctx.fill(); });
            ctx.globalAlpha = 1.0;
            phrases.forEach((p) => {
                if (!p.hovered && !isCardOpen) p.angle += p.speed;
                const x = centerX + p.baseR * radiusFactor * Math.cos(p.angle), y = centerY + p.baseR * radiusFactor * Math.sin(p.angle) * 0.35, sinA = Math.sin(p.angle);
                p.element.style.left = `${x}px`; p.element.style.top = `${y}px`;
                p.element.style.transform = `translate(-50%, -50%) scale(${p.hovered ? 1.0 : 0.75 + 0.25 * sinA})`;
                p.element.style.opacity = p.hovered ? 1.0 : 0.4 + 0.6 * ((sinA + 1) / 2);
                p.element.style.zIndex = p.hovered ? 1000 : Math.floor((sinA + 1) * 100) + 10;
            });
            hearts.forEach((h, index) => { h.update(); if (h.opacity <= 0) hearts.splice(index, 1); else h.draw(ctx); });
        }
        document.getElementById('start-btn').addEventListener('click', () => { document.getElementById('intro-overlay').style.opacity = '0'; setTimeout(() => { document.getElementById('intro-overlay').style.display = 'none'; }, 1200); });
        window.addEventListener('resize', () => { initDimensions(); generateCosmos(); });
        initDimensions(); generateCosmos(); createPhraseElements(); animate();
    </script>
</body>
</html>
